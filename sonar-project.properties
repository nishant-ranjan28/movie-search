# SonarCloud config for Marquee.
# Project key + organization come from SonarCloud's connected GitHub project.

sonar.projectKey=nishant-ranjan28_movie-search
sonar.organization=nishant-ranjan28

# Source layout
sonar.sources=src
sonar.tests=src,e2e
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,e2e/**

# Exclusions: generated/build/test-fixtures/legacy/icons
sonar.exclusions=\
  dist/**,\
  build/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  legacy/**,\
  src/components/ui/**,\
  src/shared/api/tmdb/fixtures/**,\
  public/**,\
  **/*.d.ts

# shadcn/ui generated components (`src/components/ui/`) and TMDB fixtures
# are vendor-style code — exclude from analysis to keep noise down.

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  e2e/**,\
  src/test/**,\
  src/components/ui/**,\
  src/main.tsx,\
  src/app/router.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.app.json
